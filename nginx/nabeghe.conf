# ─────────────────────────────────────────────────────────────────────────────
#  Nabeghe — nginx site config
#
#  Setup:
#    1. cp nginx/nginx.conf      /etc/nginx/nginx.conf
#    2. cp nginx/nabeghe.conf    /etc/nginx/sites-available/nabeghe.conf
#    3. ln -s /etc/nginx/sites-available/nabeghe.conf /etc/nginx/sites-enabled/
#    4. mkdir -p /var/cache/nginx/nabeghe
#    5. Replace YOUR_DOMAIN with your actual domain (e.g. nabeghe.ir)
#    6. Get SSL cert:
#         apt install certbot python3-certbot-nginx
#         certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
#    7. nginx -t && systemctl reload nginx
#
#  Static assets are served directly by nginx from the deploy directory
#  (bypasses Node.js entirely → ~10x faster for assets).
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream nabeghe_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let Certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── SSL (filled in by Certbot) ───────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # HSTS (2 years — only after you're confident HTTPS is stable)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-Frame-Options          "SAMEORIGIN"      always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Proxy common settings ────────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Upgrade           $http_upgrade;
    proxy_set_header    Connection        "upgrade";
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_read_timeout  60s;
    proxy_send_timeout  60s;
    proxy_buffering     on;
    proxy_buffer_size   16k;
    proxy_buffers       8 16k;

    # ── Static assets — served directly, no Node.js ──────────────
    location /assets/ {
        alias /opt/nabeghe/src/common/view/assets/;

        # Fonts & images: 1 year (content-addressed via filename)
        location ~* \.(woff2?|ttf|otf|eot|svg|png|jpg|jpeg|webp|ico|gif)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        # JS & CSS: 1 year
        location ~* \.(css|js)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Sitemap & robots ─────────────────────────────────────────
    location = /sitemap.xml {
        proxy_pass         http://nabeghe_app;
        proxy_cache        page_cache;
        proxy_cache_valid  200 60m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
        expires 1h;
    }

    location = /robots.txt {
        proxy_pass        http://nabeghe_app;
        proxy_cache       page_cache;
        proxy_cache_valid 200 24h;
        access_log off;
    }

    # ── Auth — strict rate limit, never cache ────────────────────
    location /auth/ {
        limit_req zone=auth_zone burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://nabeghe_app;
        proxy_no_cache      1;
        proxy_cache_bypass  1;
        add_header Cache-Control "no-store" always;
    }

    # ── Profile — user-specific, never cache ─────────────────────
    location /profile/ {
        proxy_pass http://nabeghe_app;
        proxy_no_cache      1;
        proxy_cache_bypass  1;
        add_header Cache-Control "no-store, private" always;
    }

    # ── API write endpoints — rate limited, no cache ─────────────
    location ~ ^/api/(courses|blog|profile)/.*(enroll|wishlist|comments|progress|info|phone) {
        limit_req zone=api_write burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://nabeghe_app;
        proxy_no_cache     1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
    }

    # ── API reads (course status, search) — short cache ──────────
    location /api/ {
        proxy_pass         http://nabeghe_app;
        proxy_cache        page_cache;
        proxy_cache_valid  200 30s;
        proxy_cache_methods GET HEAD;
        proxy_cache_bypass $cookie_session_id $http_authorization;
        proxy_no_cache     $cookie_session_id $http_authorization;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "no-store" always;
    }

    # ── Search ────────────────────────────────────────────────────
    location /search {
        limit_req zone=general burst=20 nodelay;

        proxy_pass         http://nabeghe_app;
        proxy_cache        page_cache;
        proxy_cache_valid  200 1m;
        proxy_cache_key    "$scheme$host$uri$is_args$args";
        proxy_cache_bypass $cookie_session_id;
        proxy_no_cache     $cookie_session_id;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── Course & blog pages — cache for logged-out users ─────────
    location ~ ^/(courses|blog)(/|$) {
        limit_req zone=general burst=30 nodelay;

        proxy_pass         http://nabeghe_app;
        proxy_cache        page_cache;
        proxy_cache_valid  200 2m;
        proxy_cache_key    "$scheme$host$uri$is_args$args";
        # logged-in users bypass cache (personalised content)
        proxy_cache_bypass $cookie_session_id;
        proxy_no_cache     $cookie_session_id;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Vary Cookie;
    }

    # ── Homepage & static pages ───────────────────────────────────
    location ~ ^/(|terms|about-us)$ {
        proxy_pass         http://nabeghe_app;
        proxy_cache        page_cache;
        proxy_cache_valid  200 5m;
        proxy_cache_key    "$scheme$host$uri";
        proxy_cache_bypass $cookie_session_id;
        proxy_no_cache     $cookie_session_id;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── Health check ─────────────────────────────────────────────
    location /health {
        proxy_pass  http://nabeghe_app;
        access_log  off;
        add_header  Cache-Control "no-store";
    }

    # ── Everything else ───────────────────────────────────────────
    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://nabeghe_app;
        add_header Cache-Control "no-store, private" always;
    }
}
