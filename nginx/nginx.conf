user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Core ──────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset      utf-8;
    server_tokens off;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout  65;
    keepalive_requests 1000;

    # ── Buffers & Timeouts ────────────────────────────────────────
    client_body_buffer_size         128k;
    client_max_body_size            10m;
    client_header_buffer_size       1k;
    large_client_header_buffers     4 16k;
    client_body_timeout             15;
    client_header_timeout           15;
    send_timeout                    15;

    # ── Open file cache ───────────────────────────────────────────
    open_file_cache          max=2000 inactive=20s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        font/opentype
        font/truetype
        application/vnd.ms-fontobject;

    # ── Proxy cache ───────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx/nabeghe
        levels=1:2
        keys_zone=page_cache:20m
        max_size=1g
        inactive=10m
        use_temp_path=off;

    # ── Rate limiting zones ───────────────────────────────────────
    # Auth: very strict — prevent brute-force / OTP spam
    limit_req_zone $binary_remote_addr zone=auth_zone:10m     rate=6r/m;
    # API writes (enroll, comment, wishlist)
    limit_req_zone $binary_remote_addr zone=api_write:10m     rate=20r/m;
    # General browsing
    limit_req_zone $binary_remote_addr zone=general:20m       rate=120r/m;

    # ── Logging ───────────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" $status '
                    '$body_bytes_sent rt=$request_time '
                    'cs=$upstream_cache_status ua="$http_user_agent"';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    include /etc/nginx/sites-enabled/*;
}
