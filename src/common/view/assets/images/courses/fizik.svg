<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <circle cx="650" cy="80" r="200" fill="#8b5cf6" opacity="0.25" filter="url(#blur)"/>
  <circle cx="100" cy="380" r="160" fill="#4c1d95" opacity="0.4" filter="url(#blur)"/>
  <!-- Atom -->
  <g transform="translate(400,185)" fill="none" stroke="white" stroke-width="4" opacity="0.15">
    <ellipse cx="0" cy="0" rx="130" ry="50"/>
    <ellipse cx="0" cy="0" rx="130" ry="50" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="130" ry="50" transform="rotate(120)"/>
    <circle cx="0" cy="0" r="18" fill="white" stroke="none"/>
    <circle cx="130" cy="0" r="10" fill="white" stroke="none"/>
  </g>
  <text x="400" y="330" font-family="serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">فیزیک</text>
  <text x="400" y="375" font-family="serif" font-size="22" fill="white" text-anchor="middle" opacity="0.6">آکادمی لیان امیری</text>
</svg>
