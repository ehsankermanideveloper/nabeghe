<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <circle cx="650" cy="80" r="190" fill="#3b82f6" opacity="0.2" filter="url(#blur)"/>
  <circle cx="100" cy="390" r="160" fill="#1e3a8a" opacity="0.4" filter="url(#blur)"/>
  <!-- Large "A" letter -->
  <text x="400" y="255" font-family="Georgia, serif" font-size="200" font-weight="bold" fill="white" text-anchor="middle" opacity="0.1">A</text>
  <!-- Speech bubble -->
  <g transform="translate(400,175)" fill="white" opacity="0.13">
    <rect x="-80" y="-60" width="160" height="100" rx="20"/>
    <polygon points="-20,40 -40,75 10,40"/>
    <rect x="-55" y="-35" width="110" height="12" rx="6" fill="white" opacity="0.7"/>
    <rect x="-55" y="-10" width="80" height="12" rx="6" fill="white" opacity="0.5"/>
    <rect x="-55" y="15" width="95" height="12" rx="6" fill="white" opacity="0.5"/>
  </g>
  <text x="400" y="330" font-family="serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">English Language</text>
  <text x="400" y="375" font-family="serif" font-size="22" fill="white" text-anchor="middle" opacity="0.6">Liyan Amiri Academy</text>
</svg>
