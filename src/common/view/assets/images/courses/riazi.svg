<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <circle cx="680" cy="70" r="180" fill="#0ea5e9" opacity="0.3" filter="url(#blur)"/>
  <circle cx="80" cy="400" r="160" fill="#075985" opacity="0.4" filter="url(#blur)"/>
  <!-- Pi symbol -->
  <text x="400" y="250" font-family="serif" font-size="160" fill="white" text-anchor="middle" opacity="0.12">π</text>
  <!-- Math symbols scattered -->
  <text x="120" y="160" font-family="serif" font-size="48" fill="white" opacity="0.08">∑</text>
  <text x="640" y="300" font-family="serif" font-size="48" fill="white" opacity="0.08">√</text>
  <text x="680" y="150" font-family="serif" font-size="36" fill="white" opacity="0.08">∞</text>
  <text x="80" y="320" font-family="serif" font-size="36" fill="white" opacity="0.08">∫</text>
  <text x="400" y="330" font-family="serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">ریاضی</text>
  <text x="400" y="375" font-family="serif" font-size="22" fill="white" text-anchor="middle" opacity="0.6">آکادمی لیان امیری</text>
</svg>
