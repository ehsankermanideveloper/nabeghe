<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#155e75"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <circle cx="650" cy="80" r="190" fill="#38bdf8" opacity="0.2" filter="url(#blur)"/>
  <circle cx="100" cy="390" r="160" fill="#0c4a6e" opacity="0.4" filter="url(#blur)"/>
  <!-- Globe icon -->
  <g transform="translate(400,185)" fill="none" stroke="white" stroke-width="4" opacity="0.15">
    <circle cx="0" cy="0" r="100"/>
    <ellipse cx="0" cy="0" rx="50" ry="100"/>
    <ellipse cx="0" cy="0" rx="100" ry="40"/>
    <line x1="-100" y1="0" x2="100" y2="0"/>
    <line x1="0" y1="-100" x2="0" y2="100"/>
  </g>
  <text x="400" y="330" font-family="serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">جغرافیه</text>
  <text x="400" y="375" font-family="serif" font-size="22" fill="white" text-anchor="middle" opacity="0.6">د لیان امیري اکاډمي</text>
</svg>
