<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <circle cx="650" cy="80" r="190" fill="#4ade80" opacity="0.2" filter="url(#blur)"/>
  <circle cx="100" cy="390" r="160" fill="#14532d" opacity="0.4" filter="url(#blur)"/>
  <!-- DNA double helix simplified -->
  <g transform="translate(400,185)" fill="none" stroke="white" stroke-width="5" opacity="0.15">
    <path d="M-60,-90 C20,-60 -20,60 60,90"/>
    <path d="M60,-90 C-20,-60 20,60 -60,90"/>
    <line x1="-30" y1="-60" x2="30" y2="-45" stroke-width="4"/>
    <line x1="-15" y1="-20" x2="15" y2="-10" stroke-width="4"/>
    <line x1="-5" y1="20" x2="5" y2="28" stroke-width="4"/>
    <line x1="-25" y1="58" x2="25" y2="68" stroke-width="4"/>
  </g>
  <text x="400" y="330" font-family="serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">بیولوژی</text>
  <text x="400" y="375" font-family="serif" font-size="22" fill="white" text-anchor="middle" opacity="0.6">آکادمی لیان امیری</text>
</svg>
