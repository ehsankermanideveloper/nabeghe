<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <circle cx="650" cy="80" r="180" fill="#6d28d9" opacity="0.4" filter="url(#blur)"/>
  <circle cx="100" cy="380" r="150" fill="#3730a3" opacity="0.4" filter="url(#blur)"/>
  <!-- Book icon -->
  <g transform="translate(310,120)" fill="white" opacity="0.15">
    <rect x="0" y="0" width="180" height="220" rx="12"/>
    <rect x="20" y="20" width="140" height="180" rx="8" fill="#4f46e5"/>
    <rect x="35" y="50" width="110" height="8" rx="4" fill="white" opacity="0.6"/>
    <rect x="35" y="72" width="90" height="8" rx="4" fill="white" opacity="0.4"/>
    <rect x="35" y="94" width="100" height="8" rx="4" fill="white" opacity="0.4"/>
    <rect x="35" y="116" width="80" height="8" rx="4" fill="white" opacity="0.3"/>
  </g>
  <text x="400" y="330" font-family="serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">زبان دری</text>
  <text x="400" y="375" font-family="serif" font-size="22" fill="white" text-anchor="middle" opacity="0.6">آکادمی لیان امیری</text>
</svg>
